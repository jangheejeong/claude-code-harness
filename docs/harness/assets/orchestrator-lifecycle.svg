<svg viewBox="0 0 880 720" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <title>/orchestrator 호출 시 생명주기</title>
  <desc>/orchestrator skill 호출 후 plan/work/review/release skill 들이 순차 호출되며 각 skill이 해당 agent들을 spawn하는 흐름</desc>

  <defs>
    <marker id="arr" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="7" markerHeight="7" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#6b7280"/>
    </marker>
    <marker id="arrLight" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
