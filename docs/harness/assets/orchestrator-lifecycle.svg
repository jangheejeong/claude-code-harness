  <rect width="880" height="720" fill="#ffffff"/>

  <text x="440" y="30" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">
    /orchestrator 호출 시 생명주기
  </text>
  <text x="440" y="50" text-anchor="middle" font-size="11" fill="#6b7280">
