<svg viewBox="0 0 920 600" xmlns="http://www.w3.org/2000/svg" role="img" font-family="-apple-system, BlinkMacSystemFont, system-ui, sans-serif">
  <title>/orchestrator 생명주기 — agent 활성화 타임라인</title>
  <desc>시간 흐름에 따라 어느 agent 가 active 인지 swim-lane 형식으로 표시. plan→work→review→release 순서로 진행되며 각 구간에서 활성화되는 agent 가 다름.</desc>

  <defs>
    <marker id="arrTL" viewBox="0 0 10 10" refX="9" refY="5" markerWidth="6" markerHeight="6" orient="auto-start-reverse">
      <path d="M0,0 L10,5 L0,10 z" fill="#9ca3af"/>
    </marker>
  </defs>

  <rect width="920" height="600" fill="#ffffff"/>

  <!-- Title -->
  <text x="460" y="28" text-anchor="middle" font-size="17" font-weight="600" fill="#111827">
    시간 흐름에 따른 agent 활성화 (1 phase 기준)
  </text>
  <text x="460" y="48" text-anchor="middle" font-size="11" fill="#6b7280">
    각 구간에서 어느 agent 가 active 인지 색칠된 블록으로 표시
  </text>

  <!-- ===== Time axis (skill periods) ===== -->
  <!-- positions: lane 시작 x=140, 끝 x=880 (740 wide), divided into skill phases -->
  <!-- /plan: 140-300 (160w), /work: 300-540 (240w), /review: 540-680 (140w), /release: 680-820 (140w), next phase indicator: 820-880 -->

  <text x="220" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">/plan</text>
  <rect x="140" y="83" width="160" height="22" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="220" y="98" text-anchor="middle" font-size="10" fill="#1e40af">설계 (한 번만)</text>

  <text x="420" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">/work N</text>
  <rect x="300" y="83" width="240" height="22" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="420" y="98" text-anchor="middle" font-size="10" fill="#1e40af">시공 (TDD)</text>

  <text x="610" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">/review</text>
  <rect x="540" y="83" width="140" height="22" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="610" y="98" text-anchor="middle" font-size="10" fill="#1e40af">검토</text>

  <text x="750" y="78" text-anchor="middle" font-size="11" font-weight="600" fill="#1e3a8a">/release</text>
  <rect x="680" y="83" width="140" height="22" rx="4" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="750" y="98" text-anchor="middle" font-size="10" fill="#1e40af">PR 생성</text>

  <rect x="820" y="83" width="60" height="22" rx="4" fill="#f3f4f6" stroke="#9ca3af" stroke-width="1" stroke-dasharray="3,2"/>
  <text x="850" y="98" text-anchor="middle" font-size="10" fill="#6b7280">다음 phase</text>

  <!-- STOP gate markers (vertical dashed lines on time axis) -->
  <!-- Stop 1: after /plan (x=300) -->
  <line x1="300" y1="75" x2="300" y2="430" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="300" cy="118" r="9" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="300" y="122" text-anchor="middle" font-size="11" fill="#7c2d12">⛔</text>

  <!-- Stop 2: after /release (x=820) -->
  <line x1="820" y1="75" x2="820" y2="430" stroke="#d97706" stroke-width="1.5" stroke-dasharray="3,2"/>
  <circle cx="820" cy="118" r="9" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="820" y="122" text-anchor="middle" font-size="11" fill="#7c2d12">⛔</text>

  <!-- STOP labels -->
  <text x="300" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#7c2d12">⛔ Plan 승인</text>
  <text x="820" y="447" text-anchor="middle" font-size="10" font-weight="600" fill="#7c2d12">⛔ PR 머지</text>

  <!-- ===== Lane labels (left) ===== -->
  <text x="20" y="155" font-size="11" font-weight="600" fill="#374151">explorer</text>
  <text x="20" y="170" font-size="9" fill="#9ca3af">sonnet · ro</text>

  <text x="20" y="200" font-size="11" font-weight="600" fill="#374151">planner</text>
  <text x="20" y="215" font-size="9" fill="#9ca3af">Opus · ro</text>

  <text x="20" y="245" font-size="11" font-weight="600" fill="#374151">coder</text>
  <text x="20" y="260" font-size="9" fill="#9ca3af">sonnet · TDD</text>

  <text x="20" y="290" font-size="11" font-weight="600" fill="#374151">tester</text>
  <text x="20" y="305" font-size="9" fill="#9ca3af">sonnet</text>

  <text x="20" y="335" font-size="11" font-weight="600" fill="#374151">reviewer</text>
  <text x="20" y="350" font-size="9" fill="#9ca3af">Opus</text>

  <text x="20" y="380" font-size="11" font-weight="600" fill="#374151">documenter</text>
  <text x="20" y="395" font-size="9" fill="#9ca3af">sonnet</text>

  <!-- Lane separators (horizontal lines) -->
  <line x1="120" y1="135" x2="880" y2="135" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="180" x2="880" y2="180" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="225" x2="880" y2="225" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="270" x2="880" y2="270" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="315" x2="880" y2="315" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="360" x2="880" y2="360" stroke="#e5e7eb" stroke-width="1"/>
  <line x1="120" y1="405" x2="880" y2="405" stroke="#e5e7eb" stroke-width="1"/>

  <!-- ===== Active blocks (the actual swim-lane content) ===== -->

  <!-- explorer: active early in /plan (140-200) -->
  <rect x="140" y="142" width="60" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="170" y="160" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active</text>
  <text x="170" y="172" text-anchor="middle" font-size="9" fill="#92400e">코드 인덱싱</text>

  <!-- planner: active rest of /plan (200-300) -->
  <rect x="200" y="187" width="100" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="250" y="205" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active</text>
  <text x="250" y="217" text-anchor="middle" font-size="9" fill="#92400e">phase 분해 + acceptance</text>

  <!-- coder: active during first half of /work (300-440), TDD cycle -->
  <rect x="300" y="232" width="140" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="370" y="250" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active (TDD)</text>
  <text x="370" y="262" text-anchor="middle" font-size="9" fill="#92400e">red → green → refactor</text>

  <!-- tester: active during second half of /work (440-540) -->
  <rect x="440" y="277" width="100" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="490" y="295" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active</text>
  <text x="490" y="307" text-anchor="middle" font-size="9" fill="#92400e">TDD 검증 + 엣지</text>

  <!-- reviewer: active during /review (540-680) -->
  <rect x="540" y="322" width="140" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="610" y="340" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active</text>
  <text x="610" y="352" text-anchor="middle" font-size="9" fill="#92400e">4-lens verdict</text>

  <!-- BLOCK fix loop: coder reactivates if BLOCK -->
  <rect x="610" y="232" width="70" height="32" rx="6" fill="#fff" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="645" y="250" text-anchor="middle" font-size="9" font-style="italic" fill="#92400e">BLOCK 시</text>
  <text x="645" y="262" text-anchor="middle" font-size="9" font-style="italic" fill="#92400e">재호출</text>

  <!-- BLOCK loop arrow: from reviewer back to coder -->
  <path d="M 580 322 Q 580 290, 640 264" fill="none" stroke="#b45309" stroke-width="1.2" stroke-dasharray="3,2" marker-end="url(#arrTL)"/>

  <!-- documenter: active during /release (680-820) -->
  <rect x="680" y="367" width="140" height="32" rx="6" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="750" y="385" text-anchor="middle" font-size="10" font-weight="600" fill="#78350f">active</text>
  <text x="750" y="397" text-anchor="middle" font-size="9" fill="#92400e">README/CHANGELOG</text>

  <!-- ===== Phase summary boxes below STOP gates ===== -->
  <!-- under Plan 승인 -->
  <rect x="200" y="455" width="200" height="60" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="300" y="473" text-anchor="middle" font-size="10" font-weight="600" fill="#111827">사용자가 할 일</text>
  <text x="300" y="488" text-anchor="middle" font-size="9" fill="#374151">Plans.md 검토 → Approval ✓</text>
  <text x="300" y="500" text-anchor="middle" font-size="9" fill="#374151">또는 자연어로 수정 요청</text>
  <text x="300" y="510" text-anchor="middle" font-size="9" fill="#374151">("Phase 2 더 쪼개줘")</text>

  <!-- under PR 머지 -->
  <rect x="720" y="455" width="200" height="60" rx="6" fill="#fafafa" stroke="#d1d5db" stroke-width="1"/>
  <text x="820" y="473" text-anchor="middle" font-size="10" font-weight="600" fill="#111827">사용자가 할 일</text>
  <text x="820" y="488" text-anchor="middle" font-size="9" fill="#374151">GitHub 에서 PR 머지</text>
  <text x="820" y="500" text-anchor="middle" font-size="9" fill="#374151">동료 리뷰 / CI 통과 후</text>
  <text x="820" y="510" text-anchor="middle" font-size="9" fill="#374151">사람이 직접 클릭</text>

  <!-- ===== Legend ===== -->
  <line x1="20" y1="540" x2="900" y2="540" stroke="#e5e7eb" stroke-dasharray="2,3"/>
  <text x="40" y="562" font-size="11" font-weight="600" fill="#374151">범례</text>

  <rect x="40" y="572" width="60" height="14" rx="3" fill="#dbeafe" stroke="#1d4ed8" stroke-width="1"/>
  <text x="108" y="583" font-size="10" fill="#374151">skill 활성 구간</text>

  <rect x="220" y="572" width="60" height="14" rx="3" fill="#fbbf24" stroke="#b45309" stroke-width="1.5"/>
  <text x="288" y="583" font-size="10" fill="#374151">agent active 구간</text>

  <rect x="400" y="572" width="60" height="14" rx="3" fill="#fff" stroke="#b45309" stroke-width="1.5" stroke-dasharray="3,2"/>
  <text x="468" y="583" font-size="10" fill="#374151">조건부 (BLOCK 시)</text>

  <circle cx="600" cy="579" r="9" fill="#fef3c7" stroke="#d97706" stroke-width="2"/>
  <text x="600" y="583" text-anchor="middle" font-size="11" fill="#7c2d12">⛔</text>
  <text x="617" y="583" font-size="10" fill="#374151">사용자 STOP 게이트</text>
</svg>
