  <rect x="220" y="650" width="20" height="14" rx="3" fill="#fef3c7" stroke="#b45309" stroke-width="1"/>
  <text x="248" y="661" font-size="10" fill="#374151">agent (격리 컨텍스트)</text>

  <rect x="380" y="650" width="20" height="14" rx="3" fill="#fef3c7" stroke="#d97706" stroke-width="2.5"/>
  <text x="408" y="661" font-size="10" fill="#374151">사용자 STOP 게이트</text>

  <line x1="540" y1="657" x2="565" y2="657" stroke="#6b7280" stroke-width="1.5" marker-end="url(#arr)"/>
